<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0c1220"/>
  <!-- Tank body -->
  <rect x="22" y="28" width="56" height="54" rx="6" fill="#172033" stroke="#2a3a55" stroke-width="2.5"/>
  <!-- Water fill -->
  <rect x="25" y="56" width="50" height="23" rx="4" fill="#0284c7" opacity="0.9"/>
  <!-- Wave top -->
  <path d="M25,56 Q37,50 50,56 Q63,62 75,56" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <!-- Inlet pipe -->
  <rect x="38" y="20" width="24" height="12" rx="4" fill="#0c1826" stroke="#2a3a55" stroke-width="2"/>
  <!-- Tank border on top -->
  <rect x="22" y="28" width="56" height="54" rx="6" fill="none" stroke="#3a5070" stroke-width="2"/>
  <!-- Percentage text -->
  <text x="50" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="-apple-system,sans-serif" opacity="0.9">50%</text>
</svg>
